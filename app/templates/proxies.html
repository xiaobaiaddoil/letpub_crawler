{% extends "base.html" %}
{% block title %}代理池管理{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="row mb-4">
    <div class="col">
      <h2>代理池管理</h2>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-md-2">
      <div class="card bg-primary text-white">
        <div class="card-body py-2">
          <h6 class="card-title mb-1">总代理数</h6>
          <h3 class="mb-0" id="stat-total">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card bg-success text-white">
        <div class="card-body py-2">
          <h6 class="card-title mb-1">可用代理</h6>
          <h3 class="mb-0" id="stat-valid">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card bg-info text-white">
        <div class="card-body py-2">
          <h6 class="card-title mb-1">隧道/私密</h6>
          <h3 class="mb-0">
            <span id="stat-tunnel">0</span>/<span id="stat-private">0</span>
          </h3>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card bg-warning text-dark">
        <div class="card-body py-2">
          <h6 class="card-title mb-1">成功率</h6>
          <h3 class="mb-0"><span id="stat-success-rate">0</span>%</h3>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card bg-secondary text-white">
        <div class="card-body py-2">
          <h6 class="card-title mb-1">总请求数</h6>
          <h3 class="mb-0" id="stat-requests">0</h3>
        </div>
      </div>
    </div>
    <div class="col-md-2">
      <div class="card bg-danger text-white">
        <div class="card-body py-2">
          <h6 class="card-title mb-1">平均响应</h6>
          <h3 class="mb-0"><span id="stat-avg-time">0</span>ms</h3>
        </div>
      </div>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-lg-7">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>导入代理</span>
          <button class="btn btn-sm btn-primary" onclick="importProxies()">导入</button>
        </div>
        <div class="card-body">
          <textarea
            class="form-control"
            id="proxy-import-text"
            rows="10"
            placeholder="1.2.3.4:8080&#10;1.2.3.4:8080:user:pass&#10;user:pass@proxy.example.com:8000&#10;http://user:pass@proxy.example.com:8000"
          ></textarea>

          <div class="row mt-3">
            <div class="col-md-3 mb-3">
              <label class="form-label">协议</label>
              <select class="form-select" id="import-protocol">
                <option value="http">HTTP</option>
                <option value="https">HTTPS</option>
                <option value="socks5">SOCKS5</option>
              </select>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label">类型</label>
              <select class="form-select" id="import-type">
                <option value="private">私密代理</option>
                <option value="tunnel">隧道代理</option>
                <option value="direct">普通代理</option>
              </select>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label">来源</label>
              <select class="form-select" id="import-source">
                <option value="manual">手动导入</option>
                <option value="kuaidaili">快代理</option>
                <option value="other">其他</option>
              </select>
            </div>
            <div class="col-md-3 mb-3">
              <label class="form-label">备注</label>
              <input class="form-control" id="import-remark" placeholder="代理网站/套餐" />
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">默认用户名</label>
              <input class="form-control" id="import-username" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">默认密码</label>
              <input class="form-control" id="import-password" />
            </div>
          </div>

          <div id="import-result" class="alert alert-info mb-0" style="display: none"></div>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>导出代理</span>
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-primary" onclick="previewExportText()">预览</button>
            <button class="btn btn-outline-success" onclick="copyExportText()">复制</button>
            <button class="btn btn-primary" onclick="downloadExportText()">下载</button>
          </div>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">格式</label>
              <select class="form-select" id="export-format">
                <option value="hostport_auth">host:port:user:pass</option>
                <option value="url">protocol://user:pass@host:port</option>
                <option value="hostport">host:port</option>
              </select>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">范围</label>
              <div class="d-flex flex-wrap gap-3 mt-2">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="export-active" checked />
                  <label class="form-check-label" for="export-active">启用</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="export-valid" />
                  <label class="form-check-label" for="export-valid">有效</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="export-auth" checked />
                  <label class="form-check-label" for="export-auth">认证</label>
                </div>
              </div>
            </div>
          </div>
          <textarea
            class="form-control"
            id="export-preview"
            rows="10"
            readonly
            placeholder="导出内容"
          ></textarea>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span>代理列表</span>
      <div class="btn-group btn-group-sm">
        <button class="btn btn-outline-primary" onclick="loadProxies(currentPage)">刷新</button>
        <button class="btn btn-outline-info" onclick="checkAllProxies()">验证全部</button>
        <button class="btn btn-outline-warning" onclick="clearInvalid()">清理无效</button>
      </div>
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>代理地址</th>
              <th>类型</th>
              <th>来源/认证</th>
              <th>状态</th>
              <th>成功/失败</th>
              <th>响应时间</th>
              <th>最后使用</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="proxy-list"></tbody>
        </table>
      </div>
      <nav><ul class="pagination" id="pagination"></ul></nav>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  let currentPage = 1;
  const pageSize = 20;

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function formatDate(value) {
    if (!value) return "-";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return "-";
    return date.toLocaleString("zh-CN", { hour12: false }).replace(/\//g, "-");
  }

  function proxyTypeBadge(type) {
    if (type === "tunnel") return '<span class="badge bg-primary">隧道</span>';
    if (type === "private") return '<span class="badge bg-success">私密</span>';
    return '<span class="badge bg-secondary">普通</span>';
  }

  async function loadStats() {
    const resp = await fetch("/api/proxies/stats");
    const data = await resp.json();
    document.getElementById("stat-total").textContent = data.total || 0;
    document.getElementById("stat-valid").textContent = data.valid || 0;
    document.getElementById("stat-tunnel").textContent = data.tunnel || 0;
    document.getElementById("stat-private").textContent = data.private || 0;
    document.getElementById("stat-success-rate").textContent = data.success_rate || 0;
    document.getElementById("stat-requests").textContent = data.total_requests || 0;
    document.getElementById("stat-avg-time").textContent = data.avg_response_time || 0;
  }

  async function loadProxies(page = 1) {
    currentPage = page;
    const resp = await fetch(`/api/proxies?page=${page}&page_size=${pageSize}`);
    const data = await resp.json();
    const tbody = document.getElementById("proxy-list");

    if (!data.items || data.items.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">暂无代理</td></tr>';
    } else {
      tbody.innerHTML = data.items
        .map(
          (p) => `
            <tr>
              <td>${p.id}</td>
              <td><code>${escapeHtml(p.protocol || "http")}://${escapeHtml(p.ip)}:${p.port}</code></td>
              <td>${proxyTypeBadge(p.proxy_type)}</td>
              <td>
                <span class="badge bg-light text-dark">${escapeHtml(p.source || "-")}</span>
                ${
                  p.username
                    ? `<span class="badge bg-info text-dark">${escapeHtml(p.username)}${p.has_password ? " / 密码" : ""}</span>`
                    : '<span class="badge bg-secondary">无认证</span>'
                }
              </td>
              <td>
                <span class="badge ${p.is_active ? "bg-success" : "bg-secondary"}">${p.is_active ? "启用" : "禁用"}</span>
                <span class="badge ${p.is_valid ? "bg-info" : "bg-danger"}">${p.is_valid ? "有效" : "无效"}</span>
              </td>
              <td><span class="text-success">${p.success_count || 0}</span> / <span class="text-danger">${p.total_fail_count || 0}</span></td>
              <td>${p.response_time ? p.response_time.toFixed(0) + "ms" : "-"}</td>
              <td>${formatDate(p.last_used_at)}</td>
              <td>
                <button class="btn btn-sm btn-outline-primary" onclick="checkProxy(${p.id})">验证</button>
                <button class="btn btn-sm btn-outline-warning" onclick="toggleProxy(${p.id})">${p.is_active ? "禁用" : "启用"}</button>
                <button class="btn btn-sm btn-outline-danger" onclick="deleteProxy(${p.id})">删除</button>
              </td>
            </tr>
          `
        )
        .join("");
    }

    const totalPages = Math.ceil((data.total || 0) / pageSize);
    const pagination = document.getElementById("pagination");
    pagination.innerHTML = "";
    for (let i = 1; i <= totalPages; i++) {
      pagination.innerHTML += `<li class="page-item ${i === page ? "active" : ""}"><a class="page-link" href="#" onclick="loadProxies(${i}); return false;">${i}</a></li>`;
    }
    loadStats();
  }

  async function importProxies() {
    const data = {
      text: document.getElementById("proxy-import-text").value,
      protocol: document.getElementById("import-protocol").value,
      proxy_type: document.getElementById("import-type").value,
      source: document.getElementById("import-source").value,
      username: document.getElementById("import-username").value,
      password: document.getElementById("import-password").value,
      remark: document.getElementById("import-remark").value,
    };
    const resp = await fetch("/api/proxies/import", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });
    const result = await resp.json();
    const resultBox = document.getElementById("import-result");
    if (resp.ok) {
      const errors = (result.errors || [])
        .map((e) => `第${e.line}行: ${escapeHtml(e.content)} - ${escapeHtml(e.error)}`)
        .join("<br>");
      resultBox.className = result.failed ? "alert alert-warning mb-0" : "alert alert-success mb-0";
      resultBox.innerHTML = `新增 ${result.added}，更新 ${result.updated}，跳过 ${result.skipped}，失败 ${result.failed}`
        + (errors ? `<hr>${errors}` : "");
      resultBox.style.display = "block";
      loadProxies(1);
    } else {
      resultBox.className = "alert alert-danger mb-0";
      resultBox.textContent = "导入失败: " + (result.detail || "未知错误");
      resultBox.style.display = "block";
    }
  }

  function buildExportUrl() {
    const params = new URLSearchParams({
      fmt: document.getElementById("export-format").value,
      only_active: document.getElementById("export-active").checked ? "true" : "false",
      only_valid: document.getElementById("export-valid").checked ? "true" : "false",
      include_auth: document.getElementById("export-auth").checked ? "true" : "false",
    });
    return `/api/proxies/export?${params.toString()}`;
  }

  async function previewExportText() {
    const resp = await fetch(buildExportUrl());
    document.getElementById("export-preview").value = await resp.text();
  }

  async function copyExportText() {
    const preview = document.getElementById("export-preview");
    if (!preview.value) await previewExportText();
    await navigator.clipboard.writeText(preview.value);
    alert("已复制到剪贴板");
  }

  function downloadExportText() {
    window.location.href = buildExportUrl();
  }

  async function deleteProxy(id) {
    if (!confirm("确定删除此代理?")) return;
    await fetch(`/api/proxies/${id}`, { method: "DELETE" });
    loadProxies(currentPage);
  }

  async function toggleProxy(id) {
    await fetch(`/api/proxies/${id}/toggle`, { method: "POST" });
    loadProxies(currentPage);
  }

  async function checkProxy(id) {
    const resp = await fetch(`/api/proxies/${id}/check`, { method: "POST" });
    const data = await resp.json();
    alert(data.is_valid ? `验证通过，响应时间: ${data.response_time?.toFixed(0)}ms` : "验证失败");
    loadProxies(currentPage);
  }

  async function checkAllProxies() {
    if (!confirm("验证所有代理可能需要较长时间，确定继续?")) return;
    const resp = await fetch("/api/proxies/check-all", { method: "POST" });
    const data = await resp.json();
    alert(`验证完成: 有效 ${data.valid}, 无效 ${data.invalid}`);
    loadProxies();
  }

  async function clearInvalid() {
    if (!confirm("确定清理所有无效代理?")) return;
    const resp = await fetch("/api/proxies/clear-invalid", { method: "POST" });
    const data = await resp.json();
    alert(`已清理 ${data.deleted} 个无效代理`);
    loadProxies();
  }

  loadProxies();
  setInterval(loadStats, 10000);
</script>
{% endblock %}
