# ==========================================
# 应用主配置文件示例
# 复制此文件为 app.yaml 并填入实际配置
# ==========================================

# 应用配置
app:
  debug: false
  console_log_level: WARNING # DEBUG/INFO/WARNING/ERROR
  host: 0.0.0.0
  port: 8000

# 运行模式
# master: 主服务器模式 - 只提供管理界面和API，不运行爬虫
# worker: Worker模式 - 请使用 worker.py 脚本运行
# standalone: 单机模式 - 管理界面 + 本地爬虫（默认）
run_mode: standalone
crawler_auto_start: true

# 数据库配置
database:
  host: localhost
  port: 5432
  name: letpub_crawler
  user: postgres
  password: "your_password"

# 爬虫配置
crawler:
  # 爬取后端：
  # http: 默认，使用登录会话 + HTTP/API 请求，速度更快
  # browser: 临时回退到 Playwright 浏览器解析
  fetch_mode: http
  allow_direct_fallback: false # 代理不可用时是否允许直连；生产建议 false
  proxy_unavailable_sleep_seconds: 60 # 代理池无可用代理时释放任务并休眠等待
  delay_min: 1 # HTTP 页面请求最小延迟（秒）
  delay_max: 3 # HTTP 页面请求最大延迟（秒）
  max_retry: 3 # 任务最大重试次数
  batch_size: 5 # 已废弃，消费者模式每次拉取1个任务，保留仅为配置兼容
  parallel_workers: 4 # 每节点消费者协程数（同时爬取的任务数）
  comment_parallel_workers: 1 # 评论任务专用消费者数，避免大评论期刊占用详情抓取
  comment_delay_min: 0.5 # 评论 API 每页请求最小延迟（秒）
  comment_delay_max: 1.5 # 评论 API 每页请求最大延迟（秒）

# 分布式配置
distributed:
  worker_id: "" # Worker标识，为空则自动生成
  task_lock_timeout: 600 # 任务锁定超时时间（秒）
  heartbeat_interval: 30 # 心跳间隔（秒）
  worker_timeout: 120 # Worker超时时间（秒）
  master_url: "" # Master服务器URL

# 加密密钥（用于加密敏感信息，可用 Fernet.generate_key() 生成）
encryption_key: ""

# Clash Verge Rev 集成（让爬虫复用本机 Clash 节点池）
# 启用后，运行 `uv run python tools/sync_clash.py` 注入 Merge.yaml + 写入 ProxyPool
clash:
  enabled: false
  # Verge Rev 数据目录
  profile_dir: "/home/cc/.local/share/io.github.clash-verge-rev.clash-verge-rev"
  # mihomo external-controller，支持两种形式：
  #   http://127.0.0.1:9097                       (TCP HTTP，需在 Verge 开启)
  #   unix:///tmp/verge/verge-mihomo.sock          (Unix domain socket，Verge 默认)
  controller: "unix:///tmp/verge/verge-mihomo.sock"
  secret: "set-your-secret"
  # 注入的 listener 本地端口
  listener_port: 60000
  # crawler-pool 在 Merge 中的 group 名
  group_name: "crawler-pool"
