# 日志配置文件
# 修改此文件后需要重启应用

[loggers]
keys=root,app

[handlers]
keys=consoleHandler,infoFileHandler,warningFileHandler,errorFileHandler,debugFileHandler

[formatters]
keys=detailed,simple,colored

# ==================== Loggers ====================

[logger_root]
level=INFO
handlers=consoleHandler,infoFileHandler,warningFileHandler,errorFileHandler

[logger_app]
level=INFO
handlers=consoleHandler,infoFileHandler,warningFileHandler,errorFileHandler
qualName=app
propagate=0

# ==================== Handlers ====================

[handler_consoleHandler]
class=StreamHandler
level=WARNING
formatter=colored
args=(sys.stdout,)

[handler_infoFileHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=detailed
args=('logs/info_%(date)s.log', 'a', 10485760, 5, 'utf-8')

[handler_warningFileHandler]
class=handlers.RotatingFileHandler
level=WARNING
formatter=detailed
args=('logs/warning_%(date)s.log', 'a', 10485760, 5, 'utf-8')

[handler_errorFileHandler]
class=handlers.RotatingFileHandler
level=ERROR
formatter=detailed
args=('logs/error_%(date)s.log', 'a', 10485760, 10, 'utf-8')

[handler_debugFileHandler]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=detailed
args=('logs/debug_%(date)s.log', 'a', 20971520, 3, 'utf-8')

# ==================== Formatters ====================

[formatter_detailed]
format=%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_simple]
format=%(asctime)s - %(levelname)s - %(message)s
datefmt=%H:%M:%S

[formatter_colored]
# 彩色格式化器（在代码中实现）
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%H:%M:%S
